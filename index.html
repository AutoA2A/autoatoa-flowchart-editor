<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">流程图编辑器</div>
                <nav>
                    <ul>
                        <li><a href="index.html">首页</a></li>

    <main class="main-content">
        <div class="container">
            <div class="content-container">
                
<divstyle="display:flex; gap:16px;">
  <!-- 工具栏 -->
  <div style="flex:0 0 120px;">
    <button id="addNodeBtn" style="background:#2f6fed;color:#fff;border:none;border-radius:4px;padding:8px;width:100%;margin-bottom:8px;">添加节点</button>
    <button id="linkModeBtn" style="background:#2f6fed;color:#fff;border:none;border-radius:4px;padding:8px;width:100%;margin-bottom:8px;">连线模式</button>
    <button id="deleteBtn" style="background:#2f6fed;color:#fff;border:none;border-radius:4px;padding:8px;width:100%;margin-bottom:8px;">删除选中</button>
    <button id="clearBtn" style="background:#2f6fed;color:#fff;border:none;border-radius:4px;padding:8px;width:100%;">清空画布</button>
  </div>

  <!-- 画布 + 属性面板 -->
  <div style="flex:1; display:flex; gap:16px;">
    <div id="canvasWrapper" style="flex:3; position:relative; background:#fafafa; border:1px solid #eee; border-radius:4px;">
      <svg id="flowCanvas" width="100%" height="100%" style="display:block;"></svg>
    </div>

    <div id="propertiesPanel" style="flex:1; background:#fff; border:1px solid #eee; border-radius:4px; padding:16px;">
      <h3 style="margin-top:0; color:#333;">属性</h3>
      <div id="propsContent" style="display:none;">
        <p>选中节点：<span id="selectedNodeId">-</span></p>
        <p>位置：<span id="selectedNodePos">(-, -)</span></p>
      </div>
    </div>
  </div>
</div>

<script>
  const svg = document.getElementById('flowCanvas');
  const addNodeBtn = document.getElementById('addNodeBtn');
  const linkModeBtn = document.getElementById('linkModeBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const clearBtn = document.getElementById('clearBtn');
  const propsContent = document.getElementById('propsContent');
  const selectedNodeIdSpan = document.getElementById('selectedNodeId');
  const selectedNodePosSpan = document.getElementById('selectedNodePos');

  let nodes = []; // {id, cx, cy, element}
  let links = []; // {sourceId, targetId, element}
  let nodeIdCounter = 1;
  let linkMode = false;
  let sourceNode = null;

  function getSVGPoint(evt) {
    const pt = svg.createSVGPoint();
    pt.x = evt.clientX;
    pt.y = evt.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  function addNode(x, y) {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'node');
    g.setAttribute('data-id', nodeIdCounter);
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', x);
    circle.setAttribute('cy', y);
    circle.setAttribute('r', 20);
    circle.setAttribute('fill', '#4a90e2');
    circle.setAttribute('stroke', '#fff');
    circle.setAttribute('stroke-width', 2);
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', x);
    text.setAttribute('y', y + 4);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', '#fff');
    text.setAttribute('font-size', 12);
    text.textContent = 'N' + nodeIdCounter;
    g.appendChild(circle);
    g.appendChild(text);
    svg.appendChild(g);
    const node = {id: nodeIdCounter, cx: x, cy: y, element: g};
    nodes.push(node);
    nodeIdCounter++;
    return node;
  }

  function selectNode(node) {
    nodes.forEach(n => {
      const circle = n.element.querySelector('circle');
      if (circle) circle.setAttribute('stroke-width', 2);
    });
    const circle = node.element.querySelector('circle');
    if (circle) circle.setAttribute('stroke-width', 4);
    selectedNodeIdSpan.textContent = node.id;
    selectedNodePosSpan.textContent = `(${Math.round(node.cx)}, ${Math.round(node.cy)})`;
    propsContent.style.display = 'block';
  }

  function clearSelection() {
    nodes.forEach(n => {
      const circle = n.element.querySelector('circle');
      if (circle) circle.setAttribute('stroke-width', 2);
    });
    selectedNodeIdSpan.textContent = '-';
    selectedNodePosSpan.textContent = '(-, -)';
    propsContent.style.display = 'none';
    sourceNode = null;
  }

  function deleteSelected() {
    if (!sourceNode) return;
    nodes = nodes.filter(n => n.id !== sourceNode.id);
    sourceNode.element.remove();
    links = links.filter(l => {
      if (l.sourceId === sourceNode.id || l.targetId === sourceNode.id) {
        l.element.remove();
        return false;
      }
      return true;
    });
    clearSelection();
  }

  function clearCanvas() {
    nodes.forEach(n => n.element.remove());
    links.forEach(l => l.element.remove());
    nodes = [];
    links = [];
    nodeIdCounter = 1;
    clearSelection();
    linkMode = false;
    linkModeBtn.textContent = '连线模式';
    linkModeBtn.style.background = '#2f6fed';
  }

  function createLink(source, target) {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const d = `M${source.cx},${source.cy} L${target.cx},${target.cy}`;
    path.setAttribute('d', d);
    path.setAttribute('stroke', '#888');
    path.setAttribute('stroke-width', 2);
    path.setAttribute('fill', 'none');
    svg.appendChild(path);
    links.push({sourceId: source.id, targetId: target.id, element: path});
  }

  svg.addEventListener('click', evt => {
    const pt = getSVGPoint(evt);
    let hitNode = null;
    nodes.forEach(n => {
      const dx = pt.x - n.cx;
      const dy = pt.y - n.cy;
      if (Math.sqrt(dx*dx + dy*dy) <= 20) hitNode = n;
    });
    if (hitNode) {
      if (linkMode && sourceNode) {
        if (sourceNode.id !== hitNode.id) createLink(sourceNode, hitNode);
        clearSelection();
        selectNode(hitNode);
      } else {
        selectNode(hitNode);
        sourceNode = hitNode;
      }
    } else {
      if (!linkMode) {
        addNode(pt.x, pt.y);
        clearSelection();
      }
    }
  });

  addNodeBtn.addEventListener('click', () => {
    const rect = svg.getBoundingClientRect();
    addNode(rect.width / 2, rect.height / 2);
    clearSelection();
  });

  linkModeBtn.addEventListener('click', () => {
    linkMode = !linkMode;
    if (linkMode) {
      linkModeBtn.textContent = '取消连线';
      linkModeBtn.style.background = '#d9534f';
    } else {
      linkModeBtn.textContent = '连线模式';
      linkModeBtn.style.background = '#2f6fed';
    }
    clearSelection();
    sourceNode = null;
  });

  deleteBtn.addEventListener('click', deleteSelected);
  clearBtn.addEventListener('click', clearCanvas);
</script>

            </div>
        </div>
    </main>
