        <div class="container">
            <div class="header-content">
                <div class="logo">流程图编辑器</div>

                    <ul>
                        <li><a href="index.html">首页</a></li>

    <main class="main-content">
        <div class="container">
            <div class="content-container">
                
<textarea id="jsonInput" placeholder="粘贴流程图 JSON 数据（例如：{\"nodes\":[{\"id\":\"1\",\"x\":100,\"y\":100,\"label\":\"开始\"}],\"edges\":[]}）" style="width:100%;height:180px;font-family:monospace;padding:8px;border:1px solid #ccc;border-radius:4px;"></textarea>
<div style="margin-top:12px;">
    <button id="renderBtn" style="background-color:#2f6fed;color:white;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;">渲染预览</button>
    <button id="shareBtn" style="background-color:#2f6fed;color:white;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;margin-left:8px;">生成分享链接</button>
    <button id="exportJsonBtn" style="background-color:#2f6fed;color:white;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;margin-left:8px;">导出 JSON</button>
    <button id="exportPngBtn" style="background-color:#2f6fed;color:white;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;margin-left:8px;">导出 PNG</button>
</div>
<div id="preview" style="margin-top:12px;border:1px solid #ddd;min-height:200px;background:#fafafa;display:flex;align-items:center;justify-content:center;color:#666;">预览区域</div>

<script>
    // 渲染流程图到 canvas
    function renderFlowchart(data) {
        const preview = document.getElementById('preview');
        preview.innerHTML = '';
        const canvas = document.createElement('canvas');
        canvas.width = 600;
        canvas.height = 400;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 2;
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 画边
        if (data.edges && Array.isArray(data.edges)) {
            data.edges.forEach(e => {
                const from = data.nodes.find(n => n.id === e.from);
                const to   = data.nodes.find(n => n.id === e.to);
                if (from && to) {
                    ctx.beginPath();
                    ctx.moveTo(from.x, from.y);
                    ctx.lineTo(to.x, to.y);
                    ctx.stroke();
                }
            });
        }
        // 画节点
        if (data.nodes && Array.isArray(data.nodes)) {
            data.nodes.forEach(n => {
                ctx.fillStyle = '#2f6fed';
                ctx.beginPath();
                ctx.arc(n.x, n.y, 20, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.fillText(n.label || n.id, n.x, n.y);
            });
        }
        preview.appendChild(canvas);
        // 保存 canvas 供导出使用
        preview.dataset.canvas = canvas;
    }

    document.getElementById('renderBtn').addEventListener('click', () => {
        const txt = document.getElementById('jsonInput').value.trim();
        if (!txt) { alert('请输入 JSON 数据'); return; }
        try {
            const data = JSON.parse(txt);
            renderFlowchart(data);
        } catch (e) {
            alert('JSON 解析失败：' + e.message);
        }
    });

    document.getElementById('shareBtn').addEventListener('click', () => {
        const txt = document.getElementById('jsonInput').value.trim();
        if (!txt) { alert('请先输入 JSON 数据'); return; }
        try {
            const data = JSON.parse(txt);
            const jsonStr = JSON.stringify(data);
            // 安全的 Base64 编码（处理 Unicode）
            const base64 = btoa(unescape(encodeURIComponent(jsonStr)));
            const url = new URL('index.html', location.origin);
            url.searchParams.set('id', base64);
            prompt('分享链接（复制后使用）', url.toString());
        } catch (e) {
            alert('JSON 解析失败：' + e.message);
        }
    });

    document.getElementById('exportJsonBtn').addEventListener('click', () => {
        const txt = document.getElementById('jsonInput').value.trim();
        if (!txt) { alert('请先输入 JSON 数据'); return; }
        try {
            const data = JSON.parse(txt);
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'flowchart.json';
            a.click();
            URL.revokeObjectURL(url);
        } catch (e) {
            alert('JSON 解析失败：' + e.message);
        }
    });

    document.getElementById('exportPngBtn').addEventListener('click', () => {
        const preview = document.getElementById('preview');
        const canvas = preview.querySelector('canvas');
        if (!canvas) { alert('请先渲染预览'); return; }
        canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'flowchart.png';
            a.click();
            URL.revokeObjectURL(url);
        });
    });
</script>
