<h2>编辑器偏好设置</h2>
<form id="settingsForm" style="margin-bottom:24px;">
  <div style="margin-bottom:12px;">
    <label for="bgColor" style="display:block;margin-bottom:4px;">画布背景色:</label>
    <input type="color" id="bgColor" value="#ffffff" style="width:100%;padding:6px;">
  </div>
  <div style="margin-bottom:12px;">
    <label for="gridSize" style="display:block;margin-bottom:4px;">网格大小 (px):</label>
    <input type="number" id="gridSize" min="5" max="50" value="10" style="width:100%;padding:6px;">
  </div>
  <div style="margin-bottom:12px;">
    <label for="snapGrid" style="display:block;margin-bottom:4px;">吸附网格:</label>
    <input type="checkbox" id="snapGrid" checked style="width:auto;">
  </div>
  <div style="margin-bottom:12px;">
    <label for="shapeFill" style="display:block;margin-bottom:4px;">默认形状填充色:</label>
    <input type="color" id="shapeFill" value="#2f6fed" style="width:100%;padding:6px;">
  </div>
  <div style="margin-bottom:12px;">
    <label for="shapeStroke" style="display:block;margin-bottom:4px;">默认形状边框色:</label>
    <input type="color" id="shapeStroke" value="#1a56db" style="width:100%;padding:6px;">
  </div>
  <div style="margin-bottom:12px;">
    <label for="fontSize" style="display:block;margin-bottom:4px;">默认文字大小 (px):</label>
    <input type="number" id="fontSize" min="8" max="32" value="14" style="width:100%;padding:6px;">
  </div>
  <div>
    <button class="btn" type="button" id="saveSettings" style="margin-right:8px;">保存设置</button>
    <a href="index.html" style="background-color:#2f6fed;color:white;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;text-decoration:none;display:inline-block;">返回编辑器</a>
  </div>
</form>

<script>
  const STORAGE_KEY = 'flowchartEditorSettings';
  const defaults = {
    bgColor: '#ffffff',
    gridSize: 10,
    snapGrid: true,
    shapeFill: '#2f6fed',
    shapeStroke: '#1a56db',
    fontSize: 14
  };

  function loadSettings() {
    const saved = localStorage.getItem(STORAGE_KEY);
    const settings = saved ? JSON.parse(saved) : defaults;
    document.getElementById('bgColor').value = settings.bgColor;
    document.getElementById('gridSize').value = settings.gridSize;
    document.getElementById('snapGrid').checked = settings.snapGrid;
    document.getElementById('shapeFill').value = settings.shapeFill;
    document.getElementById('shapeStroke').value = settings.shapeStroke;
    document.getElementById('fontSize').value = settings.fontSize;
  }

  function saveSettings() {
    const settings = {
      bgColor: document.getElementById('bgColor').value,
      gridSize: parseInt(document.getElementById('gridSize').value, 10),
      snapGrid: document.getElementById('snapGrid').checked,
      shapeFill: document.getElementById('shapeFill').value,
      shapeStroke: document.getElementById('shapeStroke').value,
      fontSize: parseInt(document.getElementById('fontSize').value, 10)
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    // Optionally notify other pages via storage event (they listen on load)
    alert('设置已保存，将在下次打开编辑器时生效。');
  }

  document.getElementById('saveSettings').addEventListener('click', saveSettings);
  window.addEventListener('load', loadSettings);
</script>
