<section style="margin-bottom: 24px;">
    <h2 style="margin-bottom: 16px;">模板库</h2>
    <div class="content-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
        <article class="content-container" style="margin-bottom: 0;">
            <h3 style="margin-bottom: 8px;">基本流程</h3>
            <p style="margin:0 0 12px;color:#555;">开始 → 处理 → 结束</p>
            <button class="btn" style="background-color:#2f6fed;color:white;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;transition:opacity .3s;" data-tpl="basic">使用此模板</button>
        </article>
        <article class="content-container" style="margin-bottom: 0;">
            <h3 style="margin-bottom: 8px;">审批流程</h3>
            <p style="margin:0 0 12px;color:#555;">开始 → 审批1 → 审批2 → 结束</p>
            <button class="btn" style="background-color:#2f6fed;color:white;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;transition:opacity .3s;" data-tpl="approval">使用此模板</button>
        </article>
        <article class="content-container" style="margin-bottom: 0;">
            <h3 style="margin-bottom: 8px;">决策流程</h3>
            <p style="margin:0 0 12px;color:#555;">开始 → 决定 → 是/否 → 处理 → 结束</p>
            <button class="btn" style="background-color:#2f6fed;color:white;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;transition:opacity .3s;" data-tpl="decision">使用此模板</button>
        </article>
    </div>
</section>

<script>
    // 预设模板数据（可自行扩展）
    const templates = {
        basic: {
            nodes: [
                {id: "n1", type: "start", label: "开始"},
                {id: "n2", type: "process", label: "处理"},
                {id: "n3", type: "end", label: "结束"}
            ],
            edges: [
                {from: "n1", to: "n2"},
                {from: "n2", to: "n3"}
            ]
        },
        approval: {
            nodes: [
                {id: "n1", type: "start", label: "开始"},
                {id: "n2", type: "approval", label: "审批1"},
                {id: "n3", type: "approval", label: "审批2"},
                {id: "n4", type: "end", label: "结束"}
            ],
            edges: [
                {from: "n1", to: "n2"},
                {from: "n2", to: "n3"},
                {from: "n3", to: "n4"}
            ]
        },
        decision: {
            nodes: [
                {id: "n1", type: "start", label: "开始"},
                {id: "n2", type: "decision", label: "决定"},
                {id: "n3", type: "process", label: "是"},
                {id: "n4", type: "process", label: "否"},
                {id: "n5", type: "end", label: "结束"}
            ],
            edges: [
                {from: "n1", to: "n2"},
                {from: "n2", to: "n3", condition: "是"},
                {from: "n2", to: "n4", condition: "否"},
                {from: "n3", to: "n5"},
                {from: "n4", to: "n5"}
            ]
        }
    };

    document.querySelectorAll('button[data-tpl]').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.getAttribute('data-tpl');
            const data = templates[key];
            if (data) {
                // 将模板数据存入 localStorage，编辑器页面自行读取
                localStorage.setItem('flowchart-template', JSON.stringify(data));
                // 跳转到编辑器首页并携带模板标识
                window.location.href = `index.html?id=${key}`;
            }
        });
    });
</script>
